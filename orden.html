<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="utf-8" />
	<meta content="width=device-width, initial-scale=1.0" name="viewport" />
	<title>Estado de Orden - Mipc Computadores</title>

	<!-- PWA Meta Tags -->
	<meta name="theme-color" content="#A3E635">
	<meta name="mobile-web-app-capable" content="yes">
	<link rel="manifest" href="/manifest.json">
	<link rel="icon" type="image/png" href="/icon-192.png">

	<link href="https://fonts.googleapis.com" rel="preconnect" />
	<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
		rel="stylesheet" />
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
	<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
	<script>
		tailwind.config = {
			darkMode: "class",
			theme: {
				extend: {
					colors: {
						primary: "#A3E635", primary_hover: "#84CC16",
						"background-light": "#F3F4F6",
						"background-dark": "#0B1120", "surface-light": "#FFFFFF",
						"surface-dark": "#151F32", "card-dark": "#1E293B",
					},
					fontFamily: {
						display: ["Inter", "sans-serif"],
						sans: ["Inter", "sans-serif"],
					},
					borderRadius: {
						DEFAULT: "0.75rem",
						'xl': "1rem",
						'2xl': "1.5rem",
					},
				},
			},
		};
	</script>
	<style>
		body {
			min-height: max(884px, 100dvh);
		}

		.modal-overlay {
			position: fixed;
			inset: 0;
			display: none;
			align-items: center;
			justify-content: center;
			background: rgba(2, 6, 8, 0.92);
			z-index: 1000;
		}

		.modal-overlay.show {
			display: flex;
		}

		.modal-overlay img {
			max-width: 92%;
			max-height: 92%;
			border-radius: 10px;
		}

		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}

		.spinner {
			width: 40px;
			height: 40px;
			border: 3px solid rgba(163, 230, 53, 0.2);
			border-top-color: #A3E635;
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
			margin: 0 auto 16px;
		}

		@media print {

			header,
			footer,
			.fab-btn,
			.modal-overlay,
			.no-print {
				display: none !important;
			}

			body {
				background: #fff !important;
				color: #000 !important;
			}

			* {
				color-adjust: exact !important;
				-webkit-print-color-adjust: exact !important;
				print-color-adjust: exact !important;
			}
		}
	</style>
</head>

<body
	class="font-sans antialiased bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-200 min-h-screen transition-colors duration-300">
	<div class="max-w-2xl mx-auto min-h-screen relative pb-10">
		<!-- Header -->
		<header
			class="sticky top-0 z-50 bg-surface-light/90 dark:bg-background-dark/90 backdrop-blur-md border-b border-gray-200 dark:border-slate-800 px-6 py-3 flex items-center justify-between shadow-sm">
			<div class="flex items-center space-x-3">
				<img src="/icon-192.png" alt="Mipc" class="w-9 h-9 rounded-lg">
				<div class="h-8 w-[1px] bg-gray-300 dark:bg-slate-700"></div>
				<h1 class="text-sm font-semibold text-slate-600 dark:text-slate-300 uppercase tracking-wide">Estado de
					Orden</h1>
			</div>
			<div class="flex items-center space-x-1 no-print">
				<button onclick="shareLink()"
					class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors text-slate-500 dark:text-slate-400"
					title="Compartir enlace">
					<span class="material-icons-round text-xl">share</span>
				</button>
				<button onclick="window.print()"
					class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors text-slate-500 dark:text-slate-400"
					title="Descargar / Imprimir">
					<span class="material-icons-round text-xl">download</span>
				</button>
			</div>
		</header>

		<!-- Content -->
		<main class="px-5 pt-6 space-y-6" id="content">
			<div class="text-center py-16 space-y-3">
				<div class="spinner"></div>
				<p class="text-sm text-slate-500 dark:text-slate-400">Buscando información de tu orden...</p>
			</div>
		</main>

		<!-- Contact Card -->
		<div class="px-5 mt-8 no-print" id="contact-card" style="display:none">
			<div
				class="bg-surface-light dark:bg-surface-dark border border-gray-200 dark:border-slate-700 rounded-2xl p-5 shadow-sm">
				<div class="flex items-center space-x-2 mb-4">
					<span class="material-icons-round text-primary text-xl">support_agent</span>
					<h3 class="text-base font-bold text-slate-800 dark:text-white">¿Necesitas ayuda?</h3>
				</div>
				<p class="text-xs text-slate-500 dark:text-slate-400 mb-4">Contáctanos para consultas sobre tu orden de
					servicio.</p>
				<div class="flex gap-3">
					<a href="https://wa.me/573202307508" target="_blank"
						class="flex-1 flex items-center justify-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-semibold py-3 rounded-xl transition-colors shadow-sm">
						<span class="material-icons-round text-lg">chat</span>
						WhatsApp
					</a>
					<a href="tel:+573202307508"
						class="flex-1 flex items-center justify-center gap-2 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-sm font-semibold py-3 rounded-xl transition-colors border border-gray-200 dark:border-slate-700">
						<span class="material-icons-round text-lg">call</span>
						Llamar
					</a>
				</div>
			</div>
		</div>

		<!-- Footer -->
		<footer class="mt-8 text-center py-6 px-4">
			<div class="flex items-center justify-center gap-2 mb-2">
				<img src="/icon-192.png" alt="Mipc" class="w-5 h-5 rounded">
				<p class="text-xs text-slate-400 dark:text-slate-500">
					<span class="text-primary font-bold">Mipc Computadores</span> — Servicio Técnico Especializado
				</p>
			</div>
			<p class="text-[10px] text-slate-400 dark:text-slate-600">
				Este enlace es privado y único para tu orden.
			</p>
		</footer>

		<!-- WhatsApp FAB -->
		<a href="https://wa.me/573202307508" target="_blank"
			class="fab-btn fixed bottom-6 right-6 w-14 h-14 bg-emerald-500 text-white rounded-full shadow-lg shadow-emerald-500/30 flex items-center justify-center hover:scale-110 transition-transform z-50">
			<span class="material-icons-round text-2xl">chat</span>
		</a>
	</div>

	<!-- Image Modal -->
	<div class="modal-overlay" id="image-modal">
		<button onclick="closeImageModal()"
			class="absolute top-4 right-4 bg-red-500 text-white px-4 py-2 rounded-lg font-semibold hover:bg-red-600 transition-colors z-50">✕
			Cerrar</button>
		<img id="modal-image" src="" alt="Imagen ampliada">
	</div>

	<script>
		// Dark mode
		if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
			document.documentElement.classList.add('dark');
		}

		const API_URL = "https://casinos-bunny-edited-officers.trycloudflare.com/api";

		const ORDER_STATUSES = {
			ingresado: 'Ingresado',
			en_reparacion: 'En reparación',
			espera_entrega: 'En espera de entrega',
			entregado: 'Entregado'
		};

		const STATUS_CLASSES = {
			ingresado: 'bg-primary text-slate-900',
			en_reparacion: 'bg-blue-400 text-white',
			espera_entrega: 'bg-yellow-400 text-slate-900',
			entregado: 'bg-emerald-400 text-slate-900'
		};

		const STATUS_STEPS = ['ingresado', 'en_reparacion', 'espera_entrega', 'entregado'];
		const STATUS_LABELS = ['Ingresado', 'En reparación', 'Espera entrega', 'Entregado'];

		function escapeHtml(s) {
			if (!s) return '';
			return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
		}

		function formatCurrency(v) {
			try {
				return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(v);
			} catch (e) {
				return '$' + (v || 0).toFixed(0);
			}
		}

		function buildProgressBar(statusKey) {
			const currentIdx = STATUS_STEPS.indexOf(statusKey);
			let html = '<div class="flex items-center w-full gap-1">';
			STATUS_STEPS.forEach((step, i) => {
				const done = i <= currentIdx;
				const isCurrent = i === currentIdx;
				const dotClass = done
					? (isCurrent ? 'bg-primary ring-4 ring-primary/20 shadow-[0_0_10px_rgba(163,230,53,0.5)]' : 'bg-primary')
					: 'bg-slate-300 dark:bg-slate-600';
				const lineClass = i <= currentIdx ? 'bg-primary' : 'bg-slate-300 dark:bg-slate-600';
				const textClass = done ? 'text-primary font-semibold' : 'text-slate-400 dark:text-slate-500';

				html += `<div class="flex flex-col items-center flex-1">`;
				html += `<div class="relative flex items-center w-full">`;
				if (i > 0) html += `<div class="flex-1 h-[3px] ${lineClass} rounded-full"></div>`;
				html += `<div class="w-4 h-4 ${dotClass} rounded-full shrink-0 transition-all"></div>`;
				if (i < STATUS_STEPS.length - 1) html += `<div class="flex-1 h-[3px] ${i < currentIdx ? 'bg-primary' : 'bg-slate-300 dark:bg-slate-600'} rounded-full"></div>`;
				html += `</div>`;
				html += `<span class="text-[9px] ${textClass} mt-1.5 text-center leading-tight">${STATUS_LABELS[i]}</span>`;
				html += `</div>`;
			});
			html += '</div>';
			return html;
		}

		async function loadOrderByToken(token) {
			try {
				console.log('Buscando orden con token:', token);
				const res = await fetch(`${API_URL}/orders`, { cache: 'no-store' });
				if (!res.ok) throw new Error(`HTTP ${res.status}`);
				const raw = await res.json();
				const orders = Array.isArray(raw) ? raw : (raw.data || raw.orders || raw.items || []);
				console.log('Órdenes cargadas:', orders.length);
				const order = orders.find(o => o.accessToken === token);
				console.log('Orden encontrada:', order ? order.id : 'null');
				return order;
			} catch (err) {
				console.error("Error al cargar orden:", err);
				return null;
			}
		}

		async function loadClient(clientId) {
			try {
				const res = await fetch(`${API_URL}/clients`, { cache: 'no-store' });
				if (!res.ok) throw new Error(`HTTP ${res.status}`);
				const raw = await res.json();
				const clients = Array.isArray(raw) ? raw : (raw.data || []);
				return clients.find(c => c.id === clientId);
			} catch (err) {
				console.error("Error al cargar cliente:", err);
				return null;
			}
		}

		async function renderOrder() {
			const params = new URLSearchParams(window.location.search);
			const token = params.get('token');
			const content = document.getElementById('content');

			console.log('Token desde URL:', token);

			if (!token) {
				content.innerHTML = `
                    <div class="text-center py-16 space-y-3">
                        <span class="material-icons-round text-5xl text-red-400">link_off</span>
                        <p class="text-sm text-red-400 font-semibold">Enlace inválido. Verifica el enlace recibido.</p>
                    </div>`;
				return;
			}

			const order = await loadOrderByToken(token);

			if (!order) {
				content.innerHTML = `
                    <div class="text-center py-16 space-y-3">
                        <span class="material-icons-round text-5xl text-red-400">error_outline</span>
                        <h3 class="text-lg font-bold text-slate-800 dark:text-white">Orden no encontrada</h3>
                        <p class="text-xs text-slate-500 dark:text-slate-400">Token: <span class="font-mono text-slate-400">${escapeHtml(token)}</span></p>
                        <p class="text-sm text-slate-500 dark:text-slate-400">Verifica que el enlace sea correcto o contacta a Mipc Computadores.</p>
                    </div>`;
				return;
			}

			const client = await loadClient(order.clientId) || { name: '--', phone: '', email: '' };
			const statusKey = order.status || 'ingresado';
			const statusLabel = ORDER_STATUSES[statusKey] || statusKey;
			const statusCls = STATUS_CLASSES[statusKey] || 'bg-slate-500 text-white';
			const isPaid = order.paid === true;
			const priceDisplay = order.price ? formatCurrency(Number(order.price)) : 'No especificado';
			const dateStr = order.date ? new Date(order.date).toLocaleDateString('es-CO', { year: 'numeric', month: 'long', day: 'numeric' }) : '--';
			const timeStr = order.date ? new Date(order.date).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }) : '';
			const techInitial = order.technician ? order.technician.charAt(0).toUpperCase() : '?';

			// Detect device type icon
			const brandLower = (order.brand || '').toLowerCase();
			let deviceIcon = 'laptop_mac';
			if (['samsung', 'iphone', 'xiaomi', 'motorola', 'huawei', 'oppo', 'realme'].some(b => brandLower.includes(b))) deviceIcon = 'smartphone';
			else if (brandLower.includes('ipad') || brandLower.includes('tablet')) deviceIcon = 'tablet_mac';
			else if (['imac', 'desktop', 'torre', 'pc'].some(b => brandLower.includes(b))) deviceIcon = 'desktop_windows';
			else if (brandLower.includes('impresora') || brandLower.includes('printer')) deviceIcon = 'print';

			// Images section
			let imagesHtml = '';
			if (order.images && order.images.length > 0) {
				imagesHtml = `
                    <div class="space-y-3">
                        <div class="flex items-center space-x-2">
                            <span class="material-icons-round text-primary text-xl">photo_library</span>
                            <h3 class="text-base font-bold text-slate-800 dark:text-white">Imágenes del Equipo</h3>
                            <span class="bg-gray-100 dark:bg-slate-800 text-xs text-slate-500 px-2 py-0.5 rounded-full">${order.images.length}</span>
                        </div>
                        <div class="grid grid-cols-3 sm:grid-cols-4 gap-3">`;
				order.images.forEach((img, idx) => {
					imagesHtml += `<div class="aspect-square rounded-xl overflow-hidden border-2 border-gray-200 dark:border-slate-700 cursor-pointer hover:border-primary hover:scale-[1.03] transition-all shadow-sm" onclick="openImageModal('${escapeHtml(img.data)}')"><img src="${escapeHtml(img.data)}" alt="Imagen ${idx + 1}" class="w-full h-full object-cover" loading="lazy"></div>`;
				});
				imagesHtml += '</div></div>';
			}

			content.innerHTML = `
                <!-- Subtitle -->
                <div class="text-center space-y-1">
                    <h2 class="text-primary font-medium tracking-wide text-sm uppercase">Estado de tu Orden</h2>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Información en tiempo real</p>
                </div>

                <!-- Status Card with Device Info -->
                <div class="bg-surface-light dark:bg-surface-dark border border-gray-200 dark:border-slate-700 rounded-2xl p-5 shadow-lg relative overflow-hidden group">
                    <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-primary/20 rounded-full blur-2xl group-hover:bg-primary/30 transition-all duration-500"></div>
                    <div class="flex items-start space-x-4 relative z-10 mb-4">
                        <div class="bg-slate-100 dark:bg-slate-800 p-3 rounded-xl flex items-center justify-center shrink-0">
                            <span class="material-icons-round text-3xl text-slate-600 dark:text-slate-300">${deviceIcon}</span>
                        </div>
                        <div class="flex-1">
                            <p class="text-[10px] text-slate-400 uppercase tracking-wider mb-0.5">Orden #${escapeHtml(order.id)}</p>
                            <h3 class="text-lg font-bold text-slate-900 dark:text-white leading-tight">${escapeHtml(order.brand || '--')} ${escapeHtml(order.model || '')}</h3>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="${statusCls} text-xs font-bold px-3 py-1 rounded-full shadow-sm">${statusLabel}</span>
                                ${isPaid
					? '<span class="bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 text-xs font-semibold px-2 py-0.5 rounded-full">✓ Pagado</span>'
					: '<span class="bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 text-xs font-semibold px-2 py-0.5 rounded-full">Pendiente</span>'}
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2 text-xs text-primary font-semibold">
                        <span class="material-icons-round text-sm">calendar_today</span>
                        <span>${dateStr}</span>
                        <span class="text-slate-400">${timeStr}</span>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div class="bg-surface-light dark:bg-surface-dark border border-gray-200 dark:border-slate-700 rounded-xl p-4 shadow-sm">
                    <p class="text-[10px] uppercase font-semibold text-slate-500 dark:text-slate-400 tracking-wider mb-3 text-center">Progreso del servicio</p>
                    ${buildProgressBar(statusKey)}
                </div>

                <!-- Price Card -->
                <div class="bg-surface-light dark:bg-surface-dark border border-gray-200 dark:border-slate-700 rounded-xl p-5 shadow-sm">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-xs text-slate-500 dark:text-slate-400 mb-1">Total del servicio</p>
                            <span class="text-2xl font-bold text-slate-900 dark:text-white">${priceDisplay}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            ${isPaid
					? '<span class="material-icons-round text-4xl text-emerald-400">verified</span>'
					: '<span class="material-icons-round text-4xl text-amber-400">pending</span>'}
                        </div>
                    </div>
                </div>

                <!-- Details Card -->
                <div class="bg-surface-light dark:bg-surface-dark border border-gray-200 dark:border-slate-700 rounded-xl p-5 shadow-sm space-y-4">
                    <div class="flex items-center space-x-2 mb-2">
                        <span class="material-icons-round text-primary text-xl">info</span>
                        <h3 class="text-base font-bold text-slate-800 dark:text-white">Detalles del Servicio</h3>
                    </div>
                    <div class="space-y-3 text-sm">
                        <div class="grid grid-cols-[90px_1fr] gap-2">
                            <span class="text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wide pt-0.5">Cliente</span>
                            <span class="font-medium text-slate-800 dark:text-slate-200">${escapeHtml(client.name)}</span>
                        </div>
                        ${client.phone ? `
                        <div class="grid grid-cols-[90px_1fr] gap-2">
                            <span class="text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wide pt-0.5">Teléfono</span>
                            <a href="tel:${escapeHtml(client.phone)}" class="font-medium text-primary hover:underline">${escapeHtml(client.phone)}</a>
                        </div>` : ''}
                        ${order.serial ? `
                        <div class="grid grid-cols-[90px_1fr] gap-2">
                            <span class="text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wide pt-0.5">Serie</span>
                            <span class="font-mono text-slate-700 dark:text-slate-200 bg-gray-100 dark:bg-slate-800 px-2 py-0.5 rounded text-xs inline-block self-start">${escapeHtml(order.serial)}</span>
                        </div>` : ''}
                        ${order.failure ? `
                        <div class="grid grid-cols-[90px_1fr] gap-2">
                            <span class="text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wide pt-0.5">Falla</span>
                            <span class="font-medium text-red-500 dark:text-red-400">${escapeHtml(order.failure)}</span>
                        </div>` : ''}
                        <div class="grid grid-cols-[90px_1fr] gap-2">
                            <span class="text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wide pt-0.5">Técnico</span>
                            <div class="flex items-center space-x-2">
                                <div class="w-5 h-5 rounded-full bg-indigo-500 flex items-center justify-center text-[10px] text-white font-bold">${techInitial}</div>
                                <span class="font-medium text-slate-800 dark:text-slate-200">${escapeHtml(order.technician || 'Por asignar')}</span>
                            </div>
                        </div>
                        ${order.accessories ? `
                        <div class="grid grid-cols-[90px_1fr] gap-2">
                            <span class="text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wide pt-0.5">Accesorios</span>
                            <span class="font-medium text-slate-600 dark:text-slate-300 bg-gray-100 dark:bg-slate-800 px-2 py-0.5 rounded text-xs inline-block self-start">${escapeHtml(order.accessories)}</span>
                        </div>` : ''}
                        ${order.notes ? `
                        <div class="grid grid-cols-[90px_1fr] gap-2">
                            <span class="text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wide pt-0.5">Notas</span>
                            <p class="text-xs text-slate-600 dark:text-slate-300 italic leading-relaxed">"${escapeHtml(order.notes)}"</p>
                        </div>` : ''}
                    </div>
                </div>

                <!-- Images -->
                ${imagesHtml}
            `;

			document.getElementById('contact-card').style.display = 'block';
		}

		function openImageModal(src) {
			const modal = document.getElementById('image-modal');
			document.getElementById('modal-image').src = src;
			modal.classList.add('show');
		}

		function closeImageModal() {
			document.getElementById('image-modal').classList.remove('show');
		}

		document.getElementById('image-modal').addEventListener('click', (e) => {
			if (e.target.id === 'image-modal') closeImageModal();
		});

		function shareLink() {
			const url = window.location.href;
			if (navigator.share) {
				navigator.share({ title: 'Estado de mi orden - Mipc', url }).catch(() => { });
			} else {
				navigator.clipboard.writeText(url).then(() => {
					const btn = document.querySelector('[title="Compartir enlace"]');
					if (btn) {
						const icon = btn.querySelector('span');
						icon.textContent = 'check';
						setTimeout(() => { icon.textContent = 'share'; }, 2000);
					}
				});
			}
		}

		document.addEventListener('DOMContentLoaded', renderOrder);
	</script>
</body>

</html>
